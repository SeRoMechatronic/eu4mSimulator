<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>

  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style type="text/css">
<!--
#NewsDiv { position: absolute; left: 0; top: 0; width: 100% }
-->
p.NewsText
{
	color:Black;
	font-size:0.6em;
	font-family:"Verdana, Arial, Helvetica, sans-serif";
	font-weight:bold;
	padding:2;
}

p.NewsText a
{
    font-size:1.25em;	
}
</style>
</head>


<body onmouseover="scrollspeed=0" onmouseout="scrollspeed=current" onload="NewsScrollStart();">
    <div id="NewsDiv">
        <table style="width: 100%;" border="0" cellpadding="0" cellspacing="0" width="100%">
            <tbody>
                <tr>
                    <td style="padding: 3pt;">
					<!--p class="NewsText">
                         [19/10/2021] <img src="/~ialvarez/Curso/index_archivos/nuevo.gif" alt="nuevo.gif" height="20" width="20"><br><a href="Descargas/Trabajo Grupo.pdf?version=2021" target="_blank">Propuesta divisi&oacute;n trabajo grupal</a>
					</p-->
					<p class="NewsText">
                         [01/09/2023]<br>P&aacute;gina actualizada curso 2024-2025
					</p>
                   </td>
                </tr>
            </tbody>
        </table>
    </div>


<script language="JavaScript" type="text/javascript">
<!-- HIDE CODE
var scrollspeed = "1" // SET SCROLLER SPEED 1 = SLOWEST
var speedjump = "30" // ADJUST SCROLL JUMPING = RANGE 20 TO 40
var startdelay = "2" // START SCROLLING DELAY IN SECONDS
var nextdelay = "0" // SECOND SCROLL DELAY IN SECONDS 0 = QUICKEST
var topspace = "2px" // TOP SPACING FIRST TIME SCROLLING
var frameheight = "200px" // IF YOU RESIZE THE WINDOW EDIT THIS HEIGHT TO MATCH
current = (scrollspeed)
function HeightData(){
AreaHeight=dataobj.offsetHeight
if (AreaHeight==0){
setTimeout("HeightData()",( startdelay * 1000 ))
}
else {
ScrollNewsDiv()
}}
function NewsScrollStart(){
dataobj=document.all? document.all.NewsDiv : document.getElementById("NewsDiv")
dataobj.style.top=topspace
setTimeout("HeightData()",( startdelay * 1000 ))
	if(dataobj.src.indexOf('timestamp') > -1){ // Check if we still have a timestamp in the URL from a previous refresh
	  dataobj.src = dataobj.src.replace(/timestamp=[^&]+/, 'timestamp=' + Date.now()); // And if so, replace it instead of appending so the URL doesn't grow too long.
	}else{ // Else we will append the timestamp
	  dataobj.src += (dataobj.src.indexOf('?') > -1 ? "&" : "?") + 'timestamp=' + Date.now();// If the URL contains a ?, append &timestamp=...; otherwise, append ?timestamp=...
	}
}
function ScrollNewsDiv(){
dataobj.style.top=parseInt(dataobj.style.top)-(scrollspeed)
if (parseInt(dataobj.style.top)<AreaHeight*(-1)) {
dataobj.style.top=frameheight
setTimeout("ScrollNewsDiv()",( nextdelay * 1000 ))
}
else {
setTimeout("ScrollNewsDiv()",speedjump)
}}
// END HIDE CODE -->
</script>
</body>
</html>
